spring.application.name=ewallet

# MariaDB
#spring.datasource.url=jdbc:mariadb://localhost:3306/ewallet
#spring.datasource.username=root
#spring.datasource.password=sapassword
#spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
# SQL Server
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=vtpay;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=sapassword
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.springframework.security=DEBUG

# Server
server.port=8080

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html

# JWT
jwt.secret-key=12345678901234567890123456789012345678901234567890
jwt.expiration=86400000